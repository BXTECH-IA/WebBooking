<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebBooking - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <script>
        // Aplica o tema salvo definido no Dashboard
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light');
        }
    </script>
    <div class="container" style="height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div class="card" style="width: 100%; max-width: 400px;">
            <h2 style="text-align: center;">Login</h2>
            <form id="loginForm">
                <div style="margin-bottom: 15px;">
                    <label>Usuário</label>
                    <input type="text" id="username" required>
                </div>
                <div style="margin-bottom: 20px;">
                    <label>Senha</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" required>
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility(this)" aria-label="Mostrar senha">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <button type="submit" style="width: 100%;">Entrar</button>
            </form>
            <p id="errorMsg" style="color: var(--danger-color); text-align: center; margin-top: 10px; display: none;">
            </p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const errorMsg = document.getElementById('errorMsg');
            errorMsg.style.display = 'none';

            try {
                const res = await login(username, password);
                if (res.error) {
                    errorMsg.textContent = res.error;
                    errorMsg.style.display = 'block';
                } else {
                    localStorage.setItem('merchantId', res.merchantId);
                    localStorage.setItem('merchantName', res.username);
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                errorMsg.textContent = 'Erro ao conectar com o servidor';
                errorMsg.style.display = 'block';
            }
        });
    </script>
    <!-- theme.js não é carregado aqui: o Dashboard controla a preferência -->
</body>

</html>
