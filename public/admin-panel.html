<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin Panel</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-layout {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-top: 20px;
        }
        @media (max-width: 768px) {
            .admin-layout {
                grid-template-columns: 1fr;
            }
        }
        .merchant-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .merchant-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        .merchant-item:last-child {
            border-bottom: none;
        }
        .btn-danger {
            background-color: var(--danger-color);
        }
        .btn-danger:hover {
            background-color: #c9302c;
        }
        .badge {
            background-color: var(--primary-color);
            color: #000;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <script>
        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
    </script>
    
    <div class="container" style="max-width: 1000px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>Painel Master de Administração</h2>
            <a href="index.html" class="btn">Voltar ao Login</a>
        </div>
        
        <div class="admin-layout">
            <!-- Form Card -->
            <div class="card">
                <h3>Criar Novo Comerciante</h3>
                <p style="font-size: 14px; color: var(--text-color); margin-bottom: 15px;">Preencha os dados abaixo para gerar um novo acesso. O lojista poderá personalizar a barbearia pelo Dashboard.</p>
                <form id="createMerchantForm">
                    <div style="margin-bottom: 15px;">
                        <label>Usuário de Login</label>
                        <input type="text" id="newUsername" placeholder="ex: barbearia_central" required>
                    </div>
                    <div style="margin-bottom: 20px;">
                        <label>Senha</label>
                        <div class="password-wrapper">
                            <input type="password" id="newPassword" placeholder="Senha segura" required>
                            <button type="button" class="password-toggle" onclick="togglePasswordVisibility(this)" aria-label="Mostrar senha">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>
                    <button type="submit" style="width: 100%;">Criar Conta</button>
                    <p id="formMsg" style="text-align: center; margin-top: 10px; font-weight: bold; display: none;"></p>
                </form>
            </div>

            <!-- List Card -->
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3>Comerciantes Cadastrados <span id="totalMerchants" class="badge">0</span></h3>
                    <button id="refreshBtn" onclick="loadMerchants()" style="padding: 5px 10px; background: transparent; border: 1px solid var(--border-color); color: var(--text-color);">Atualizar</button>
                </div>
                
                <div id="loadingMerchants" style="text-align: center; padding: 20px; color: var(--text-color);">Carregando...</div>
                <ul class="merchant-list" id="merchantsList" style="display: none;">
                    <!-- JS fills this -->
                </ul>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
